name: CI

on:
  push:
    branches: [main, open-source-productization]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Compile
        run: python -m py_compile main.py check_keys.py
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest --cov=main --cov-report=term-missing --cov-report=xml

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install audit tool
        run: python -m pip install --upgrade pip pip-audit
      - name: Dependency audit
        run: pip-audit --strict || true
